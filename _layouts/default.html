<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      nav {
        margin-bottom: 1.5em;
        padding-bottom: 0.75em;
        border-bottom: 1px solid #ddd;
      }
      nav a {
        margin-right: 1.25em;
        font-size: 0.95em;
        font-weight: bold;
      }
      .social-links {
        margin-top: 0.5em;
      }
      .social-links a {
        margin-right: 1em;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
        {% if site.description %}
        <p>{{ site.description }}</p>
        {% endif %}
        <nav>
          <a href="{{ "/" | relative_url }}">Home</a>
          <a href="{{ "/vita" | relative_url }}">Vita</a>
          <a href="{{ "/publications" | relative_url }}">Publications</a>
        </nav>
        <div class="social-links">
          <a href="https://github.com/Sebge" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile (opens in new tab)">GitHub</a>
          <a href="https://www.linkedin.com/in/sebastian-germer-08b794262/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile (opens in new tab)">LinkedIn</a>
        </div>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        {% if site.github.is_project_page %}
        <p>This project is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
        {% endif %}
        <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p>
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
